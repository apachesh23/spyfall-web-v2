# fly.toml app configuration file generated for spyfall-game-server on 2026-04-18T06:00:04+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'spyfall-game-server'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"
  context = "apps/game-server"

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
